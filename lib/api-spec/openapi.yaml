openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ITIL v4 Change Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: roles
  - name: changes
  - name: templates
  - name: planning
  - name: testing
  - name: approvals
  - name: cab
  - name: comments
  - name: dashboard
  - name: settings
  - name: audit
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  # ---------- AUTH ----------
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginBody" }
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionUser" }
        "401":
          description: Invalid credentials
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
  /auth/setup-status:
    get:
      operationId: getSetupStatus
      tags: [auth]
      description: |
        First-time setup probe. Returns `{ needsSetup: true }` only when the
        seeded `admin` row exists with no password — i.e. the operator has
        not yet completed first-time setup. Unauthenticated.
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SetupStatus" }
  /auth/setup:
    post:
      operationId: completeSetup
      tags: [auth]
      description: |
        Claim the seeded `admin` account by setting its password. Only valid
        while `getSetupStatus` reports `needsSetup: true`. On success the
        response also sets the session and CSRF cookies so the operator is
        signed in immediately. Returns 409 once setup has already been done.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetupBody" }
      responses:
        "200":
          description: Setup complete; session established
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionUser" }
        "400":
          description: Bad request
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "409":
          description: Setup already completed
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "204": { description: Logged out }
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionUser" }
        "401":
          description: Not authenticated
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChangePasswordBody" }
      responses:
        "204": { description: OK }
        "400": { description: Bad request, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  # ---------- USERS ----------
  /users:
    get:
      operationId: listUsers
      tags: [users]
      parameters:
        - { in: query, name: search, schema: { type: string } }
        - { in: query, name: role, schema: { type: string } }
        - in: query
          name: primary
          description: When combined with `role`, restrict to non-deputy assignments.
          schema: { type: string, enum: ["1", "true"] }
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
    post:
      operationId: createUser
      tags: [users]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateUserBody" } } }
      responses:
        "201":
          description: Created
          content: { application/json: { schema: { $ref: "#/components/schemas/User" } } }
  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: User
          content: { application/json: { schema: { $ref: "#/components/schemas/User" } } }
    patch:
      operationId: updateUser
      tags: [users]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpdateUserBody" } } }
      responses:
        "200":
          description: Updated
          content: { application/json: { schema: { $ref: "#/components/schemas/User" } } }
    delete:
      operationId: deleteUser
      tags: [users]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /users/{id}/notification-preferences:
    get:
      operationId: getNotificationPreferences
      tags: [users]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Prefs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/NotificationPreference" }
    put:
      operationId: updateNotificationPreferences
      tags: [users]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: "#/components/schemas/NotificationPreference" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/NotificationPreference" }

  # ---------- ROLES ----------
  /roles:
    get:
      operationId: listRoles
      tags: [roles]
      responses:
        "200":
          description: Roles
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Role" }
  /role-assignments:
    get:
      operationId: listRoleAssignments
      tags: [roles]
      responses:
        "200":
          description: Assignments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RoleAssignment" }
    post:
      operationId: createRoleAssignment
      tags: [roles]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateRoleAssignmentBody" } } }
      responses:
        "201":
          description: Created
          content: { application/json: { schema: { $ref: "#/components/schemas/RoleAssignment" } } }
  /role-assignments/{id}:
    delete:
      operationId: deleteRoleAssignment
      tags: [roles]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }

  # ---------- CHANGES ----------
  /changes:
    get:
      operationId: listChanges
      tags: [changes]
      parameters:
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: track, schema: { type: string } }
        - { in: query, name: ownerId, schema: { type: integer } }
        - { in: query, name: search, schema: { type: string } }
      responses:
        "200":
          description: Changes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ChangeRequest" }
    post:
      operationId: createChange
      tags: [changes]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateChangeBody" } } }
      responses:
        "201":
          description: Created
          content: { application/json: { schema: { $ref: "#/components/schemas/ChangeRequest" } } }
  /changes/{id}:
    get:
      operationId: getChange
      tags: [changes]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Change
          content: { application/json: { schema: { $ref: "#/components/schemas/ChangeDetail" } } }
    patch:
      operationId: updateChange
      tags: [changes]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpdateChangeBody" } } }
      responses:
        "200":
          description: Updated
          content: { application/json: { schema: { $ref: "#/components/schemas/ChangeRequest" } } }
    delete:
      operationId: deleteChange
      tags: [changes]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /changes/{id}/transition:
    post:
      operationId: transitionChange
      tags: [changes]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TransitionBody" } } }
      responses:
        "200":
          description: Transitioned
          content: { application/json: { schema: { $ref: "#/components/schemas/ChangeRequest" } } }
        "400": { description: Invalid transition, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  # ---------- TEMPLATES ----------
  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      responses:
        "200":
          description: Templates
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StandardTemplate" }
    post:
      operationId: createTemplate
      tags: [templates]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateTemplateBody" } } }
      responses:
        "201":
          description: Created
          content: { application/json: { schema: { $ref: "#/components/schemas/StandardTemplate" } } }
  /templates/{id}:
    get:
      operationId: getTemplate
      tags: [templates]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Template
          content: { application/json: { schema: { $ref: "#/components/schemas/StandardTemplate" } } }
    patch:
      operationId: updateTemplate
      tags: [templates]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpdateTemplateBody" } } }
      responses:
        "200":
          description: Updated
          content: { application/json: { schema: { $ref: "#/components/schemas/StandardTemplate" } } }
    delete:
      operationId: deleteTemplate
      tags: [templates]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }

  # ---------- PLANNING ----------
  /changes/{id}/planning:
    get:
      operationId: getPlanning
      tags: [planning]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Planning
          content: { application/json: { schema: { $ref: "#/components/schemas/PlanningRecord" } } }
    put:
      operationId: upsertPlanning
      tags: [planning]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpsertPlanningBody" } } }
      responses:
        "200":
          description: Saved
          content: { application/json: { schema: { $ref: "#/components/schemas/PlanningRecord" } } }

  # ---------- TESTING / PIR ----------
  /changes/{id}/testing:
    get:
      operationId: getTesting
      tags: [testing]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Testing
          content: { application/json: { schema: { $ref: "#/components/schemas/TestRecord" } } }
    put:
      operationId: upsertTesting
      tags: [testing]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpsertTestingBody" } } }
      responses:
        "200":
          description: Saved
          content: { application/json: { schema: { $ref: "#/components/schemas/TestRecord" } } }
  /changes/{id}/pir:
    get:
      operationId: getPir
      tags: [testing]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: PIR
          content: { application/json: { schema: { $ref: "#/components/schemas/PirRecord" } } }
    put:
      operationId: upsertPir
      tags: [testing]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpsertPirBody" } } }
      responses:
        "200":
          description: Saved
          content: { application/json: { schema: { $ref: "#/components/schemas/PirRecord" } } }

  # ---------- APPROVALS ----------
  /changes/{id}/approvals:
    get:
      operationId: listApprovals
      tags: [approvals]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Approvals
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Approval" }
  /approvals/{id}/vote:
    post:
      operationId: voteApproval
      tags: [approvals]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/VoteBody" } } }
      responses:
        "200":
          description: Voted
          content: { application/json: { schema: { $ref: "#/components/schemas/Approval" } } }

  # ---------- CAB ----------
  /cab-meetings:
    get:
      operationId: listCabMeetings
      tags: [cab]
      parameters:
        - { in: query, name: from, schema: { type: string, format: date-time } }
        - { in: query, name: to, schema: { type: string, format: date-time } }
        - { in: query, name: kind, schema: { type: string } }
      responses:
        "200":
          description: Meetings
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CabMeeting" }
    post:
      operationId: createCabMeeting
      tags: [cab]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateCabMeetingBody" } } }
      responses:
        "201":
          description: Created
          content: { application/json: { schema: { $ref: "#/components/schemas/CabMeeting" } } }
  /cab-meetings/{id}:
    get:
      operationId: getCabMeeting
      tags: [cab]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Meeting
          content: { application/json: { schema: { $ref: "#/components/schemas/CabMeetingDetail" } } }
    patch:
      operationId: updateCabMeeting
      tags: [cab]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpdateCabMeetingBody" } } }
      responses:
        "200":
          description: Updated
          content: { application/json: { schema: { $ref: "#/components/schemas/CabMeeting" } } }
    delete:
      operationId: deleteCabMeeting
      tags: [cab]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /cab-meetings/{id}/ics:
    get:
      operationId: getCabMeetingIcs
      tags: [cab]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: ICS calendar invite
          content:
            text/calendar:
              schema: { type: string }
  /cab-meetings/{id}/send-invites:
    post:
      operationId: sendCabInvites
      tags: [cab]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "204": { description: Invites sent }

  # ---------- COMMENTS ----------
  /changes/{id}/comments:
    get:
      operationId: listComments
      tags: [comments]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Comment" }
    post:
      operationId: createComment
      tags: [comments]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateCommentBody" } } }
      responses:
        "201":
          description: Created
          content: { application/json: { schema: { $ref: "#/components/schemas/Comment" } } }

  # ---------- DASHBOARD ----------
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      responses:
        "200":
          description: Summary
          content: { application/json: { schema: { $ref: "#/components/schemas/DashboardSummary" } } }
  /dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      responses:
        "200":
          description: Activity
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ActivityItem" }
  /dashboard/upcoming-cab:
    get:
      operationId: getUpcomingCab
      tags: [dashboard]
      responses:
        "200":
          description: Upcoming
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CabMeeting" }
  /dashboard/my-tasks:
    get:
      operationId: getMyTasks
      tags: [dashboard]
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TaskItem" }

  # ---------- SETTINGS ----------
  /settings/smtp:
    get:
      operationId: getSmtpSettings
      tags: [settings]
      responses:
        "200":
          description: SMTP
          content: { application/json: { schema: { $ref: "#/components/schemas/SmtpSettings" } } }
    put:
      operationId: updateSmtpSettings
      tags: [settings]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/SmtpSettings" } } }
      responses:
        "200":
          description: Updated
          content: { application/json: { schema: { $ref: "#/components/schemas/SmtpSettings" } } }
  /settings/smtp/test:
    post:
      operationId: testSmtp
      tags: [settings]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TestEmailBody" } } }
      responses:
        "200":
          description: Result
          content: { application/json: { schema: { $ref: "#/components/schemas/TestResult" } } }
  /settings/ldap:
    get:
      operationId: getLdapSettings
      tags: [settings]
      responses:
        "200":
          description: LDAP
          content: { application/json: { schema: { $ref: "#/components/schemas/LdapSettings" } } }
    put:
      operationId: updateLdapSettings
      tags: [settings]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/LdapSettings" } } }
      responses:
        "200":
          description: Updated
          content: { application/json: { schema: { $ref: "#/components/schemas/LdapSettings" } } }
  /settings/ldap/test:
    post:
      operationId: testLdap
      tags: [settings]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TestLdapBody" } } }
      responses:
        "200":
          description: Result
          content: { application/json: { schema: { $ref: "#/components/schemas/TestResult" } } }
  /settings/ssl:
    get:
      operationId: getSslSettings
      tags: [settings]
      responses:
        "200":
          description: SSL
          content: { application/json: { schema: { $ref: "#/components/schemas/SslSettings" } } }
    put:
      operationId: updateSslSettings
      tags: [settings]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpdateSslBody" } } }
      responses:
        "200":
          description: Updated
          content: { application/json: { schema: { $ref: "#/components/schemas/SslSettings" } } }
  /settings/workflow-timeouts:
    get:
      operationId: getWorkflowTimeouts
      tags: [settings]
      responses:
        "200":
          description: Timeouts
          content: { application/json: { schema: { $ref: "#/components/schemas/WorkflowTimeouts" } } }
    put:
      operationId: updateWorkflowTimeouts
      tags: [settings]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/WorkflowTimeouts" } } }
      responses:
        "200":
          description: Updated
          content: { application/json: { schema: { $ref: "#/components/schemas/WorkflowTimeouts" } } }

  # ---------- AUDIT ----------
  /audit-log:
    get:
      operationId: listAuditLog
      tags: [audit]
      parameters:
        - { in: query, name: actorId, schema: { type: integer } }
        - { in: query, name: action, schema: { type: string } }
        - { in: query, name: entityType, schema: { type: string } }
        - { in: query, name: entityId, schema: { type: integer } }
        - { in: query, name: from, schema: { type: string, format: date-time } }
        - { in: query, name: to, schema: { type: string, format: date-time } }
        - { in: query, name: limit, schema: { type: integer } }
        - { in: query, name: offset, schema: { type: integer } }
      responses:
        "200":
          description: Entries
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AuditEntry" }
        "403": { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /audit-log/export:
    get:
      operationId: exportAuditLog
      tags: [audit]
      parameters:
        - { in: query, name: actorId, schema: { type: integer } }
        - { in: query, name: action, schema: { type: string } }
        - { in: query, name: entityType, schema: { type: string } }
        - { in: query, name: from, schema: { type: string, format: date-time } }
        - { in: query, name: to, schema: { type: string, format: date-time } }
      responses:
        "200":
          description: CSV
          content:
            text/csv:
              schema: { type: string }
        "403": { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    Error:
      type: object
      properties:
        error: { type: string }
      required: [error]

    LoginBody:
      type: object
      properties:
        username: { type: string }
        password: { type: string }
      required: [username, password]

    ChangePasswordBody:
      type: object
      properties:
        currentPassword: { type: string }
        newPassword: { type: string }
      required: [currentPassword, newPassword]

    SetupStatus:
      type: object
      properties:
        needsSetup: { type: boolean }
      required: [needsSetup]

