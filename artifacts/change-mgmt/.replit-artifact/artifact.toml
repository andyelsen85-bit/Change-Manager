kind = "web"
previewPath = "/"
title = "Change Management"
version = "1.0.0"
id = "artifacts/change-mgmt"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "pnpm --filter @workspace/change-mgmt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/change-mgmt", "run", "build" ]
publicDir = "artifacts/change-mgmt/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/"
