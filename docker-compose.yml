services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # NOTE on POSTGRES_PASSWORD: this service binds Postgres to the internal
    # docker network only (no `ports:` mapping), so the password is never
    # reachable from outside the host. The default below lets a clean
    # `docker compose up` succeed without any prior bootstrap; deployments
    # that want a custom password can still set POSTGRES_PASSWORD in .env.
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-change_mgmt}
      POSTGRES_USER: ${POSTGRES_USER:-change_mgmt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_mgmt_internal_only}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-change_mgmt} -d ${POSTGRES_DB:-change_mgmt}"]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    build:
      context: .
      target: builder
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-change_mgmt}:${POSTGRES_PASSWORD:-change_mgmt_internal_only}@db:5432/${POSTGRES_DB:-change_mgmt}
    command: ["pnpm", "--filter", "@workspace/db", "run", "push"]
    restart: "no"

  api:
    build:
      context: .
      target: api
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # JWT_SECRET resolution: if .env (or the host environment) supplies one,
    # the entrypoint honours it. Otherwise the entrypoint generates a strong
    # 64-byte hex secret on first boot and persists it to the `api_secrets`
    # volume so it survives restarts and existing sessions stay valid.
    environment:
      NODE_ENV: production
      PORT: "8080"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-change_mgmt}:${POSTGRES_PASSWORD:-change_mgmt_internal_only}@db:5432/${POSTGRES_DB:-change_mgmt}
    volumes:
      - api_secrets:/var/secrets
    expose:
      - "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6

  web:
    build:
      context: .
      target: web
    depends_on:
      api:
        condition: service_healthy
    environment:
      DISABLE_TLS: ${DISABLE_TLS:-false}
      TLS_HOSTNAME: ${TLS_HOSTNAME:-change-mgmt.local}
      TLS_SELFSIGNED_DAYS: ${TLS_SELFSIGNED_DAYS:-365}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./certs:/etc/nginx/certs
    restart: unless-stopped

volumes:
  db_data:
  api_secrets:
