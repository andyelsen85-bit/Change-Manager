user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout 65;
  server_tokens off;
  client_max_body_size 25m;

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 256;

  upstream api_upstream {
    server api:8080;
    keepalive 32;
  }

  # HTTP -> HTTPS redirect (when TLS enabled).
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ACME challenge passthrough (if used by external client).
    location /.well-known/acme-challenge/ {
      root /var/www/acme;
    }

    # If TLS is enabled, redirect everything else to HTTPS.
    # When TLS is disabled, serve directly via include of the http-only block below.
    include /etc/nginx/conf.d/redirect-or-serve.conf;
  }

  # HTTPS server (only loaded when TLS is enabled by entrypoint).
  include /etc/nginx/conf.d/tls-server.conf;
}
